services:
  matcha_db:
    image: postgres:16-alpine
    container_name: matcha_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h ${POSTGRES_HOST} -p ${POSTGRES_PORT}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  matcha_server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: matcha_server
    restart: unless-stopped
    depends_on:
      matcha_db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=matcha_db
    volumes:
      - ./server:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${PORT:-3000}:3000"

  matcha_client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: matcha_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
