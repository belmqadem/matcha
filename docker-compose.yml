services:
  matcha_redis:
    image: redis:7-alpine
    container_name: matcha_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  matcha_db:
    image: postgres:16-alpine
    container_name: matcha_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  matcha_server:
    build: ./server
    container_name: matcha_server
    restart: unless-stopped
    depends_on:
      matcha_db:
        condition: service_healthy
      matcha_redis:
        condition: service_healthy
      matcha_mailhog:
        condition: service_started
    env_file:
      - .env
    # environment:
    # - SMTP_HOST=matcha_mailhog
    # - SMTP_PORT=1025
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  matcha_client:
    build: ./client
    container_name: matcha_client
    restart: unless-stopped
    depends_on:
      matcha_server:
        condition: service_healthy
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host

  matcha_mailhog:
    image: mailhog/mailhog:latest
    container_name: matcha_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP — your server sends emails here
      - "8025:8025" # Web UI — open http://localhost:8025 to read emails

  matcha_nginx:
    image: nginx:alpine
    container_name: matcha_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/scripts/generate-cert.sh:/generate-cert.sh:ro
      - nginx_certs:/etc/nginx/certs
    entrypoint: ["/bin/sh", "/generate-cert.sh"]
    depends_on:
      matcha_server:
        condition: service_healthy
      matcha_client:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  uploads:
  nginx_certs:
